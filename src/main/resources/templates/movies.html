<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahoy! Free Movie Treasures This Month</title>
    <link rel="stylesheet" th:href="@{/css/movies.css}">
</head>
<body>
    <div class="container">
        <h1>🏴‍☠️ Ahoy! Free Movie Treasures This Month 🏴‍☠️</h1>
        
        <!-- Search Navigation -->
        <div class="search-navigation">
            <a href="/movies/search-page" class="search-nav-btn">🔍 Search the Seven Seas for Movies!</a>
        </div>
        
        <div class="movies-grid">
            <div class="movie-card" th:each="movie : ${movies}">
                <div class="movie-icon" th:text="${movie.icon}">🎬</div>
                <h3 th:text="${movie.movieName}">Movie Title</h3>
                <div class="movie-details">
                    <p class="director">Captain (Director): <span th:text="${movie.director}">Director Name</span></p>
                    <p class="year">Year of Discovery: <span th:text="${movie.year}">2023</span></p>
                    <p class="genre">Treasure Type: <span th:text="${movie.genre}">Drama</span></p>
                    <p class="duration">Adventure Length: <span th:text="${movie.duration}">120</span> minutes</p>
                </div>
                <div class="rating">
                    <span class="stars">
                        <span th:each="i : ${#numbers.sequence(1, 5)}" 
                              th:text="${i <= movie.imdbRating ? '★' : (i - 0.5 == movie.imdbRating ? '⭐' : '☆')}">★</span>
                    </span>
                    <span class="rating-score" th:text="${#numbers.formatDecimal(movie.imdbRating, 1, 1)} + '/5 doubloons'">5.0/5 doubloons</span>
                </div>
                <a th:href="@{/movies/{id}/details(id=${movie.id})}" class="details-btn">🔍 Explore This Treasure!</a>
            </div>
        </div>
    </div>
</body>
</html>
